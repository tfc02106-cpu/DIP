<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人基本資料表</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f9f9f9;
            width: 15%;
            font-weight: bold;
            color: #555;
        }
        .photo-cell {
            width: 25%;
            text-align: center;
            vertical-align: middle;
            color: #999;
            background-color: #fafafa;
        }
        input[type="text"], input[type="email"], input[type="tel"] {
            width: 90%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-item {
            margin-bottom: 8px;
        }
        .small-text {
            font-size: 0.85em;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>個人基本資料表</h2>
    
    <table>
        <tr>
            <th>姓名</th>
            <td><input type="text"></td>
            <th>性別</th>
            <td><input type="text"></td>
            <td rowspan="3" class="photo-cell">照片貼附處</td>
        </tr>
        <tr>
            <th>生日</th>
            <td colspan="3">
                西元 <input type="text" style="width: 60px;"> 年 
                <input type="text" style="width: 40px;"> 月 
                <input type="text" style="width: 40px;"> 日
            </td>
        </tr>
        <tr>
            <th>國籍</th>
            <td colspan="3"><input type="text"></td>
        </tr>
        <tr>
            <th>手機</th>
            <td><input type="tel"></td>
            <th>E-mail</th>
            <td colspan="2"><input type="email"></td>
        </tr>
        <tr>
            <th>現居地址</th>
            <td colspan="4"><input type="text" style="width: 96%;"></td>
        </tr>
        <tr>
            <th>學校</th>
            <td colspan="4"><input type="text" style="width: 96%;"></td>
        </tr>
        <tr>
            <th>科系</th>
            <td colspan="4">
                <input type="text" style="width: 60%;"> 
                <label><input type="checkbox"> 日間部</label>
            </td>
        </tr>
        <tr>
            <th>語言能力</th>
            <td colspan="4">
                <div class="lang-item">
                    1. 中 文：
                    <label><input type="radio" name="cn"> 流利</label>
                    <label><input type="radio" name="cn"> 中等</label>
                    <label><input type="radio" name="cn"> 尚可</label>
                    <span class="small-text">&lt;對應校內華語快篩測驗成績 B1 A2 A1&gt;</span>
                </div>
                <div class="lang-item">
                    2. 英 文：
                    <label><input type="radio" name="en"> 流利</label>
                    <label><input type="radio" name="en"> 中等</label>
                    <label><input type="radio" name="en"> 尚可</label>
                </div>
                <div class="lang-item">
                    3. <input type="text" style="width: 80px;" placeholder="其他語言">：
                    <label><input type="radio" name="other"> 流利</label>
                    <label><input type="radio" name="other"> 中等</label>
                    <label><input type="radio" name="other"> 尚可</label>
                </div>
            </td>
        </tr>
        <tr>
            <th>專長</th>
            <td colspan="4">
                <textarea style="width: 96%; height: 80px; border: 1px solid #ddd; border-radius: 4px; padding: 5px;"></textarea>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
